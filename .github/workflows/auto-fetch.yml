name: 自动双源无损强行合并-备用线

on:
  schedule:
    # 🎯 彻底避开整点塞车！换算北京时间为早上 8:43 和晚上 20:43 准时全自动合流
    - cron: '43 0,12 * * *'
  workflow_dispatch:

# 🌟 显式强制赋予工作流最高写权限，彻底杜绝 128 推送报错
permissions: write-all

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout own repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 1. 下载两个标准公共大底包
    - name: Fetch target files
      run: |
        mkdir -p datas
        curl -L "https://cnb.cool/fish2018/xs/-/git/raw/main/api.json" -o datas/cnb.json
        curl -L "https://raw.githubusercontent.com/FGBLH/GHK/refs/heads/main/海豚666.json" -o datas/haitun.json

    # 2. 执行安全对象级绿色过滤与自适应改名脚本
    - name: Text Merge JSON
      run: |
        python modify_config.py

    # 3. 核心修正：精准同步控制开关并提交
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 🌟【核心修复】禁止 Git 对中文路径进行转义，彻底解决乱码匹配不到文件的问题
        git config --global core.quotepath false
        
        # 🌟 直接把整个 datas 文件夹全部 add 进来，不管中文名怎么变都能 100% 抓到
        git add datas/
        
        if git diff-index --quiet HEAD; then
          echo "文件没有变化，无需更新。"
        else
          git commit -m "双源自适应硬核净化合并 (老杨TV纯净版系列): $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
