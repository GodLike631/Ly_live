name: 自动双源无损强行合并-备用线

on:
  schedule:
    # 🎯 彻底避开整点塞车！换算北京时间为早上 8:43 和晚上 20:43 准时全自动合流
    - cron: '43 0,12 * * *'
  workflow_dispatch:

# 🌟 显式强制赋予工作流最高写权限，彻底杜绝 128 推送报错
permissions: write-all

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout own repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 1. 下载两个标准公共大底包
    - name: Fetch target files
      run: |
        mkdir -p datas
        curl -L "https://cnb.cool/fish2018/xs/-/git/raw/main/api.json" -o datas/cnb.json
        curl -L "https://raw.githubusercontent.com/FGBLH/HKL/refs/heads/main/ok%E6%B5%B7%E8%B1%9A.json" -o datas/haitun.json

    # 2. 执行安全对象级绿色过滤与自适应改名脚本
    - name: Text Merge JSON
      env:
        # 把密钥安全传给 Python 核心进行直发
        TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python modify_config.py

    # 3. 全量追踪、中文防乱码、安全异步提交机制
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --global core.quotepath false
        
        git add datas/
        if ! git diff --cached --exit-code --quiet; then
          git commit -m "自动同步最新绿色去敏感纯净版合并接口: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:${{ github.ref_name }}
        else
          echo "纯净版接口文件无任何实际变化，无需更新，优雅退出。"
        fi
